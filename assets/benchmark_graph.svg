<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
  <defs>
    <linearGradient id="mcaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="linearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400.0" y="50" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="28" font-weight="bold">
    Linear Benchmark: Disk Usage Comparison
  </text>

  <!-- Grid lines -->
  <line x1="80" y1="420" x2="720" y2="420" stroke="#334155" stroke-width="2"/>
  <line x1="80" y1="80" x2="720" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="250.0" x2="720" y2="250.0" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-Axis labels -->
  <text x="70" y="420" text-anchor="end" fill="#94a3b8" font-family="sans-serif" font-size="14">0 MB</text>
  <text x="70" y="250.0" text-anchor="end" fill="#94a3b8" font-family="sans-serif" font-size="14">100 MB</text>
  <text x="70" y="80" text-anchor="end" fill="#94a3b8" font-family="sans-serif" font-size="14">200 MB</text>

  <!-- MCA Bar -->
  <rect x="180.0" y="91.815" width="120" height="328.185" fill="url(#mcaGrad)" rx="8" filter="url(#shadow)"/>
  <text x="240.0" y="76.815" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="20" font-weight="bold">193.05 MB</text>
  <text x="240.0" y="445" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="16">MCA (Vanilla)</text>

  <!-- Linear Bar -->
  <rect x="500.0" y="308.327" width="120" height="111.67299999999999" fill="url(#linearGrad)" rx="8" filter="url(#shadow)"/>
  <text x="560.0" y="293.327" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="20" font-weight="bold">65.69 MB</text>
  <text x="560.0" y="445" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="16">Linear (Compressed)</text>

  <!-- Savings Badge -->
  <circle cx="670" cy="100" r="60" fill="none" stroke="#10b981" stroke-width="4" stroke-dasharray="8 4"/>
  <text x="670" y="95" text-anchor="middle" fill="#10b981" font-family="sans-serif" font-size="24" font-weight="bold">66.0%</text>
  <text x="670" y="120" text-anchor="middle" fill="#10b981" font-family="sans-serif" font-size="12">SPACE SAVED</text>

</svg>
