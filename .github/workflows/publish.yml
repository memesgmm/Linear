name: Publish to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.3.3)'
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build both JARs
        run: |
          chmod +x scripts/build_all.sh
          ./scripts/build_all.sh

      - name: Publish Legacy (1.21.x) to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ secrets.MODRINTH_PROJECT_ID }}
          version: ${{ github.event.release.tag_name || github.event.inputs.version }}+legacy
          name: "Linear v${{ github.event.release.tag_name || github.event.inputs.version }} (1.21.x Legacy)"
          loaders: neoforge
          game-versions: |
            1.21.1
            1.21.11
            21.1.x
          files: output_jars/linear-legacy.jar
          changelog: ${{ github.event.release.body }}

      - name: Publish Modern (NeoForge 26+) to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ secrets.MODRINTH_PROJECT_ID }}
          version: ${{ github.event.release.tag_name || github.event.inputs.version }}+modern
          name: "Linear v${{ github.event.release.tag_name || github.event.inputs.version }} (26.x Modern)"
          loaders: neoforge
          game-versions: |
            26.1.x
          files: output_jars/linear-modern.jar
          changelog: ${{ github.event.release.body }}
